<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ad Astra — signal loss</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <black-hole>
      <canvas class="js-canvas" aria-hidden="true"></canvas>
    </black-hole>
    <div class="astronaut-float" aria-hidden="true">
      <div class="astronaut-float__bob">
        <img
          class="astronaut-float__img"
          src="images/astronaut.png"
          alt=""
          decoding="async"
          fetchpriority="high"
          width="378"
          height="426"
          onerror="this.onerror=null;this.src='images/astronaut.svg'"
        />
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
